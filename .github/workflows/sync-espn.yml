name: Sync resultados ESPN

# Mantém o bolão atualizado mesmo quando NINGUÉM está com o site aberto: bate no
# endpoint /tarefas/sync periodicamente. No Render free o app hiberna após ~15 min
# ociosos e o sync só rodava em visitas humanas — este cron é a rede de segurança
# que registra resultados (e acorda o serviço) sem depender de ninguém acessar.
#
# O endpoint é ABERTO (sem token): a ação é inofensiva — só dispara a leitura de
# resultados da ESPN, com throttle (SyncState), que faz a maioria das chamadas saírem
# baratas (só a 1ª de cada janela bate na ESPN). A granularidade fina de jogos ao vivo
# continua vindo do auto-refresh de 60s da própria página quando alguém está assistindo.
#
# Sem configuração: a URL do app está fixa abaixo. Se a URL do Render mudar, edite-a aqui.
#
# Custo: repositório tem ~2000 min/mês grátis de Actions; a cada ~1 min/run,
# */15 ≈ 96 runs/dia. A Copa é finita (Final 2026-07-19) — DESABILITE este workflow
# depois da Final. Para registrar resultados mais rápido durante o mata-mata, troque
# para */10 ou */5 (gasta mais minutos).

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: sync-espn
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar /tarefas/sync
        run: |
          curl --fail --silent --show-error --location --max-time 120 \
            -X POST \
            "https://copa-phibra.onrender.com/tarefas/sync"
          echo ""
          echo "sync disparado."
