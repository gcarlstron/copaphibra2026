[pytest]
# Coloca a raiz do projeto no sys.path para que `import app` funcione
# independentemente de como o pytest Ă© invocado (`pytest` pelado OU
# `python -m pytest`). Sem isso, o `pytest` direto sĂ³ enxerga a pasta tests/
# e falha com "ModuleNotFoundError: No module named 'app'".
pythonpath = .
testpaths = tests
