<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">Bolão interno</p>
                <h1>{{ app_name }}</h1>
            </div>
            <nav class="topbar-nav">
                {% if user_id %}
                <a class="topbar-link" href="/">Dashboard</a>
                <a class="topbar-link" href="/jogos">Jogos</a>
                <a class="topbar-link" href="/palpites">Meus palpites</a>
                {% if is_admin %}
                <a class="topbar-link topbar-link--admin" href="/admin/rodadas">Admin</a>
                {% endif %}
                <a class="topbar-link" href="/trocar-senha">Trocar senha</a>
                <form method="post" action="/logout" style="display:contents">
                    <button class="status-pill" type="submit">Sair</button>
                </form>
                {% else %}
                <a class="status-pill" href="/login">Entrar</a>
                {% endif %}
            </nav>
        </header>

        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
