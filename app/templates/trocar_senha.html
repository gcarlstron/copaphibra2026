{% extends "base.html" %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <p class="eyebrow">Sua conta</p>
        <h2>Trocar senha</h2>

        {% if sucesso %}
        <p class="auth-message auth-message--ok" role="status">Senha alterada com sucesso.</p>
        {% elif erro %}
        <p class="auth-message auth-message--erro" role="alert">{{ erro }}</p>
        {% endif %}

        <form method="post" action="/trocar-senha" class="auth-form">
            <label>
                Senha atual
                <input type="password" name="senha_atual" autocomplete="current-password" required>
            </label>
            <label>
                Nova senha
                <input type="password" name="nova_senha" autocomplete="new-password" minlength="6" required>
            </label>
            <label>
                Confirmar nova senha
                <input type="password" name="confirmacao" autocomplete="new-password" minlength="6" required>
            </label>
            <button type="submit">Salvar nova senha</button>
        </form>
    </div>
</section>
{% endblock %}
